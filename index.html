<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speakli - למד אנגלית בקלות | Learn English the Easy Way</title>
  <meta name="description" content="Speakli - אפליקציית למידת אנגלית אינטראקטיבית לכל הגילאים. שיעורים מובנים, תרגול דיבור, משחקים ו-AI.">
  <meta property="og:title" content="Speakli - Learn English the Easy Way">
  <meta property="og:description" content="Interactive English learning app for all ages. Structured lessons, speech practice, games & AI.">
  <meta property="og:image" content="/icons/icon-512.png">
  <link rel="icon" href="/icons/icon-32.png" type="image/png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --teal: #0d9488;
      --teal-light: #14b8a6;
      --emerald: #10b981;
      --purple: #8b5cf6;
      --pink: #ec4899;
      --amber: #f59e0b;
      --blue: #3b82f6;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Rubik', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #1a1a1a;
      overflow-x: hidden;
      background: #030712;
    }

    /* ===== HERO ===== */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 30% 20%, rgba(13,148,136,0.15) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(139,92,246,0.1) 0%, transparent 50%),
                  linear-gradient(180deg, #030712 0%, #0f172a 100%);
      overflow: hidden;
      padding: 40px 24px;
    }

    /* Animated background orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }

    .orb-1 {
      width: 400px; height: 400px;
      background: rgba(13,148,136,0.2);
      top: -100px; right: -100px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 300px; height: 300px;
      background: rgba(139,92,246,0.15);
      bottom: -50px; left: -50px;
      animation-delay: -4s;
    }

    .orb-3 {
      width: 200px; height: 200px;
      background: rgba(16,185,129,0.12);
      top: 40%; left: 20%;
      animation-delay: -2s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* Particle grid */
    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 2px; height: 2px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 600px;
    }

    /* App icon with glow */
    .app-icon-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 32px;
    }

    .app-icon-glow {
      position: absolute;
      inset: -20px;
      background: radial-gradient(circle, rgba(13,148,136,0.4) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    .app-icon {
      width: 140px;
      height: 140px;
      border-radius: 32px;
      position: relative;
      z-index: 1;
      box-shadow: 0 20px 60px rgba(13,148,136,0.3), 0 0 0 1px rgba(255,255,255,0.1);
      animation: icon-float 4s ease-in-out infinite;
    }

    @keyframes icon-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .hero h1 {
      font-size: clamp(40px, 8vw, 64px);
      font-weight: 900;
      background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .hero .tagline {
      font-size: clamp(18px, 4vw, 24px);
      font-weight: 500;
      background: linear-gradient(135deg, var(--teal-light), var(--emerald));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
    }

    .hero .subtitle {
      font-size: 16px;
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 40px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    /* CTA Buttons */
    .cta-group {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
    }

    .cta-primary {
      background: linear-gradient(135deg, var(--teal), var(--emerald));
      color: white;
      box-shadow: 0 8px 32px rgba(13,148,136,0.4);
    }

    .cta-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(13,148,136,0.5);
    }

    .cta-secondary {
      background: rgba(255,255,255,0.05);
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
    }

    .cta-secondary:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-2px);
    }

    .cta-icon { font-size: 20px; }

    /* Store badges */
    .store-badges {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      opacity: 0.7;
    }

    .store-badge {
      font-size: 13px;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }

    /* Scroll indicator */
    .scroll-indicator {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: #475569;
      font-size: 12px;
      animation: bounce-down 2s ease-in-out infinite;
    }

    .scroll-arrow {
      width: 24px; height: 24px;
      border-left: 2px solid #475569;
      border-bottom: 2px solid #475569;
      transform: rotate(-45deg);
    }

    @keyframes bounce-down {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(10px); }
    }

    /* ===== STATS BAR ===== */
    .stats-bar {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      border-top: 1px solid rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 40px 24px;
    }

    .stats-grid {
      max-width: 800px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      text-align: center;
    }

    .stat-item .stat-number {
      font-size: 32px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--teal-light), var(--emerald));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-item .stat-label {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
    }

    /* ===== FEATURES ===== */
    .features {
      padding: 100px 24px;
      background: linear-gradient(180deg, #0f172a 0%, #030712 100%);
      position: relative;
    }

    .section-header {
      text-align: center;
      margin-bottom: 64px;
    }

    .section-badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      background: rgba(13,148,136,0.1);
      color: var(--teal-light);
      border: 1px solid rgba(13,148,136,0.2);
      margin-bottom: 16px;
    }

    .section-title {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 800;
      color: white;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    .section-subtitle {
      font-size: 16px;
      color: #64748b;
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.7;
    }

    .features-grid {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .feature-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 32px 24px;
      transition: all 0.4s;
      position: relative;
      overflow: hidden;
    }

    .feature-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--teal), var(--emerald));
      opacity: 0;
      transition: opacity 0.4s;
    }

    .feature-card:hover {
      background: rgba(255,255,255,0.06);
      transform: translateY(-4px);
      border-color: rgba(13,148,136,0.2);
    }

    .feature-card:hover::before { opacity: 1; }

    .feature-emoji {
      font-size: 40px;
      margin-bottom: 16px;
      display: block;
    }

    .feature-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: white;
      margin-bottom: 10px;
    }

    .feature-card p {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
    }

    /* ===== HOW IT WORKS ===== */
    .how-it-works {
      padding: 100px 24px;
      background: #030712;
      position: relative;
    }

    .steps {
      max-width: 700px;
      margin: 0 auto;
      position: relative;
    }

    .steps::before {
      content: '';
      position: absolute;
      right: 28px;
      top: 40px;
      bottom: 40px;
      width: 2px;
      background: linear-gradient(180deg, var(--teal), var(--purple), var(--pink));
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 24px;
      padding: 24px 0;
      position: relative;
    }

    .step-number {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .step:nth-child(1) .step-number { background: linear-gradient(135deg, var(--teal), var(--emerald)); }
    .step:nth-child(2) .step-number { background: linear-gradient(135deg, var(--blue), var(--purple)); }
    .step:nth-child(3) .step-number { background: linear-gradient(135deg, var(--purple), var(--pink)); }
    .step:nth-child(4) .step-number { background: linear-gradient(135deg, var(--amber), #ef4444); }

    .step-content h3 {
      font-size: 20px;
      font-weight: 700;
      color: white;
      margin-bottom: 8px;
    }

    .step-content p {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
    }

    /* ===== KIDS MODE ===== */
    .kids-section {
      padding: 100px 24px;
      background: linear-gradient(180deg, #030712 0%, #0f172a 50%, #030712 100%);
      position: relative;
    }

    .kids-content {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: center;
    }

    .kids-visual {
      position: relative;
      display: flex;
      justify-content: center;
    }

    .kids-phone {
      width: 260px;
      height: 520px;
      background: linear-gradient(135deg, #1e293b, #334155);
      border-radius: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      padding: 16px;
      position: relative;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5);
    }

    .kids-screen {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #ecfdf5, #f0fdfa);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      overflow: hidden;
    }

    .kids-screen .owl {
      font-size: 64px;
      animation: icon-float 3s ease-in-out infinite;
    }

    .kids-screen .abc-blocks {
      display: flex;
      gap: 8px;
    }

    .abc-block {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      color: white;
      animation: pop 0.6s ease-out both;
    }

    .abc-block:nth-child(1) { background: #ef4444; animation-delay: 0.2s; }
    .abc-block:nth-child(2) { background: var(--amber); animation-delay: 0.4s; }
    .abc-block:nth-child(3) { background: var(--emerald); animation-delay: 0.6s; }
    .abc-block:nth-child(4) { background: var(--blue); animation-delay: 0.8s; }

    @keyframes pop {
      0% { transform: scale(0) rotate(-10deg); opacity: 0; }
      60% { transform: scale(1.1) rotate(3deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .kids-screen-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--teal);
    }

    .kids-features {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kids-feature {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .kids-feature-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .kids-feature h4 {
      font-size: 16px;
      font-weight: 700;
      color: white;
      margin-bottom: 4px;
    }

    .kids-feature p {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.5;
    }

    /* ===== TESTIMONIALS ===== */
    .testimonials {
      padding: 100px 24px;
      background: #030712;
    }

    .testimonials-grid {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .testimonial {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 24px;
    }

    .testimonial-stars {
      color: var(--amber);
      font-size: 16px;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    .testimonial p {
      font-size: 14px;
      color: #cbd5e1;
      line-height: 1.6;
      margin-bottom: 16px;
      font-style: italic;
    }

    .testimonial-author {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .testimonial-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: rgba(255,255,255,0.05);
    }

    .testimonial-name {
      font-size: 13px;
      font-weight: 600;
      color: white;
    }

    .testimonial-role {
      font-size: 11px;
      color: #64748b;
    }

    /* ===== FINAL CTA ===== */
    .final-cta {
      padding: 100px 24px;
      text-align: center;
      position: relative;
      background: radial-gradient(ellipse at center, rgba(13,148,136,0.08) 0%, transparent 70%),
                  #030712;
    }

    .final-cta .app-icon-small {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin-bottom: 24px;
      box-shadow: 0 12px 40px rgba(13,148,136,0.3);
    }

    .final-cta h2 {
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 800;
      color: white;
      margin-bottom: 16px;
    }

    .final-cta p {
      font-size: 16px;
      color: #64748b;
      margin-bottom: 32px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ===== FOOTER ===== */
    .footer {
      padding: 40px 24px;
      border-top: 1px solid rgba(255,255,255,0.05);
      background: #030712;
    }

    .footer-content {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .footer-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .footer-logo {
      width: 32px; height: 32px;
      border-radius: 8px;
    }

    .footer-brand span {
      font-size: 16px;
      font-weight: 700;
      color: white;
    }

    .footer-links {
      display: flex;
      gap: 24px;
    }

    .footer-links a {
      font-size: 13px;
      color: #64748b;
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--teal-light); }

    .footer-copy {
      width: 100%;
      text-align: center;
      font-size: 12px;
      color: #475569;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.03);
    }

    /* ===== LANG TOGGLE (floating) ===== */
    .lang-fab {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      padding: 8px 16px;
      border-radius: 12px;
      background: rgba(15,23,42,0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      gap: 4px;
    }

    .lang-fab button {
      padding: 6px 12px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      background: transparent;
      color: #64748b;
    }

    .lang-fab button.active {
      background: var(--teal);
      color: white;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .features-grid { grid-template-columns: repeat(2, 1fr); }
      .testimonials-grid { grid-template-columns: 1fr; max-width: 400px; }
      .kids-content { grid-template-columns: 1fr; text-align: center; }
      .kids-visual { order: -1; }
      .kids-features { align-items: center; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .steps::before { right: 28px; }
    }

    @media (max-width: 480px) {
      .features-grid { grid-template-columns: 1fr; max-width: 400px; margin: 0 auto; }
      .cta-group { flex-direction: column; align-items: center; }
      .cta-btn { width: 100%; max-width: 280px; justify-content: center; }
      .footer-content { flex-direction: column; text-align: center; }
      .footer-links { flex-wrap: wrap; justify-content: center; }
    }

    /* Scroll animations */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <!-- Language Toggle -->
  <div class="lang-fab">
    <button class="active" onclick="setLang('he')">עברית</button>
    <button onclick="setLang('en')">EN</button>
  </div>

  <!-- ===== HERO ===== -->
  <section class="hero">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="particles" id="particles"></div>

    <div class="hero-content">
      <div class="app-icon-wrap">
        <div class="app-icon-glow"></div>
        <img src="/icons/icon-512.png" alt="Speakli" class="app-icon">
      </div>
      <h1>Speakli</h1>
      <p class="tagline" data-he="למד אנגלית בקלות" data-en="Learn English the Easy Way"></p>
      <p class="subtitle" data-he="אפליקציית למידת אנגלית חכמה לכל המשפחה. שיעורים מובנים, תרגול דיבור, שיחות AI, משחקים ומערכת חזרות — הכל בחינם." data-en="A smart English learning app for the whole family. Structured lessons, speech practice, AI conversations, games and a review system — all for free."></p>

      <div class="cta-group">
        <a href="/app" class="cta-btn cta-primary">
          <span class="cta-icon">&#x1F680;</span>
          <span data-he="התחל ללמוד עכשיו" data-en="Start Learning Now"></span>
        </a>
        <a href="#features" class="cta-btn cta-secondary">
          <span class="cta-icon">&#x2728;</span>

  <script>
    let currentLang = 'he';

    function setLang(lang) {
      currentLang = lang;
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
      document.querySelectorAll('.lang-fab button').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`.lang-fab button[onclick="setLang('${lang}')"]`).classList.add('active');
      document.querySelectorAll('[data-he]').forEach(el => {
        const text = el.getAttribute(`data-${lang}`);
        if (text) el.textContent = text;
      });
    }

    // Particles
    (function() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.animationDelay = (Math.random() * 3) + 's';
        p.style.animationDuration = (2 + Math.random() * 3) + 's';
        container.appendChild(p);
      }
    })();

    // Scroll reveal
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    setLang('he');
  </script>
